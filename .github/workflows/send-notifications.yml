name: Send daily song notifications

on:
  schedule:
    # Run once daily between 9:30pm - 10:30pm America/Los_Angeles (PST/PDT)
    # GitHub cron uses UTC, include both UTC equivalents to cover DST changes:
    - cron: '30 4 * * *'   # 9:30 PM PDT (UTC-7)
    - cron: '0 5 * * *'    # 10:00 PM PDT / 9:00 PM PST (UTC-7 / UTC-8)
    - cron: '30 5 * * *'   # 10:30 PM PDT / 9:30 PM PST (UTC-7 / UTC-8)
    - cron: '0 6 * * *'    # 10:00 PM PST (UTC-8)
    - cron: '30 6 * * *'   # 10:30 PM PST (UTC-8)
  workflow_dispatch:
    inputs:
      force:
        description: 'Set to 1 to force send (bypass schedule check)'
        required: false
        default: '0'

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug Schedule Information
        run: |
          echo "=== SCHEDULE DEBUG INFORMATION ==="
          echo ""
          echo "✅ CURRENT TIME:"
          echo "   UTC:  $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "   PST:  $(TZ=America/Los_Angeles date +"%Y-%m-%d %H:%M:%S %Z")"
          echo ""
          echo "✅ SCHEDULED WINDOW: 9:30 PM - 10:30 PM PST DAILY"
          echo ""
          echo "✅ UPCOMING SCHEDULED RUNS:"
          echo "   Next at 9:30PM PST -> $(TZ=America/Los_Angeles date -d 'today 21:30' +"%Y-%m-%d %H:%M:%S %Z")"
          echo "   Next at 10:00PM PST -> $(TZ=America/Los_Angeles date -d 'today 22:00' +"%Y-%m-%d %H:%M:%S %Z")"
          echo "   Next at 10:30PM PST -> $(TZ=America/Los_Angeles date -d 'today 22:30' +"%Y-%m-%d %H:%M:%S %Z")"
          echo ""
          echo "✅ UTC EQUIVALENTS:"
          echo "   9:30 PM PST = $(date -u -d "TZ=\"America/Los_Angeles\" 21:30" +"%H:%M UTC")"
          echo "   10:00 PM PST = $(date -u -d "TZ=\"America/Los_Angeles\" 22:00" +"%H:%M UTC")"
          echo "   10:30 PM PST = $(date -u -d "TZ=\"America/Los_Angeles\" 22:30" +"%H:%M UTC")"
          echo ""
          echo "✅ CRON ENTRIES CONFIGURED:"
          echo "   - cron: '30 4 * * *'   ->  9:30 PM PDT"
          echo "   - cron: '0 5 * * *'    -> 10:00 PM PDT / 9:00 PM PST"
          echo "   - cron: '30 5 * * *'   -> 10:30 PM PDT / 9:30 PM PST"
          echo "   - cron: '0 6 * * *'    -> 10:00 PM PST"
          echo "   - cron: '30 6 * * *'   -> 10:30 PM PST"
          echo ""
          echo "=================================="

      - name: Run send notifications script
        env:
          NODE_ENV: production
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          # Scheduling: run between 9:30pm - 10:30pm in America/Los_Angeles
          SONG_NOTIFICATIONS_TIMEZONE: 'America/Los_Angeles'
          SONG_NOTIFICATIONS_HOUR: '22'
          SONG_NOTIFICATIONS_MINUTE: '0'
          SEND_BATCH_SIZE: '50'
          FORCE_SEND: ${{ github.event.inputs.force || '0' }}
        run: npm run send:notifications
