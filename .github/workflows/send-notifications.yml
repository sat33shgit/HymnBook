name: Send daily song notifications

on:
  schedule:
    # run once daily at 11:15 America/Los_Angeles. GitHub cron uses UTC,
    # so include both UTC equivalents to cover PDT and PST (DST).
    - cron: '15 18 * * *'  # 11:15 PDT (UTC-7)
    - cron: '15 19 * * *'  # 11:15 PST (UTC-8)
  workflow_dispatch:
    inputs:
      force:
        description: 'Set to 1 to force send (bypass schedule check)'
        required: false
        default: '0'

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Debug step removed: avoid printing environment/secrets in CI runs

      # Debug step removed: avoid printing environment/secrets in CI runs

      - name: Run send notifications script
        env:
          NODE_ENV: production
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          # Scheduling: run at 11:15 in America/Los_Angeles
          SONG_NOTIFICATIONS_TIMEZONE: 'America/Los_Angeles'
          SONG_NOTIFICATIONS_HOUR: '11'
          SONG_NOTIFICATIONS_MINUTE: '15'
          SEND_BATCH_SIZE: '50'
          FORCE_SEND: ${{ github.event.inputs.force || '0' }}
        run: npm run send:notifications
