name: Send daily song notifications

on:
  schedule:
    # Run once daily between 11:15am - 12:00pm America/Los_Angeles (PST/PDT)
    # GitHub cron uses UTC, include both UTC equivalents to cover DST changes:
    - cron: '15 18 * * *'  # 11:15 AM PDT (UTC-7)
    - cron: '45 18 * * *'  # 11:45 AM PDT / 10:45 AM PST (UTC-7 / UTC-8)
    - cron: '0 19 * * *'   # 12:00 PM PDT / 11:00 AM PST (UTC-7 / UTC-8)
    - cron: '15 19 * * *'  # 11:15 AM PST (UTC-8)
    - cron: '0 20 * * *'   # 12:00 PM PST (UTC-8)
  workflow_dispatch:
    inputs:
      force:
        description: 'Set to 1 to force send (bypass schedule check)'
        required: false
        default: '0'

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug Schedule Information
        run: |
          echo "=== SCHEDULE DEBUG INFORMATION ==="
          echo ""
          echo "✅ CURRENT TIME:"
          echo "   UTC:  $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "   PST:  $(TZ=America/Los_Angeles date +"%Y-%m-%d %H:%M:%S %Z")"
          echo ""
          echo "✅ SCHEDULED WINDOW: 10:00 AM - 11:00 AM PST DAILY"
          echo ""
          echo "✅ UPCOMING SCHEDULED RUNS:"
          echo "   Next at 10:00AM PST -> $(TZ=America/Los_Angeles date -d 'today 10:00' +"%Y-%m-%d %H:%M:%S %Z")"
          echo "   Next at 10:30AM PST -> $(TZ=America/Los_Angeles date -d 'today 10:30' +"%Y-%m-%d %H:%M:%S %Z")"
          echo "   Next at 11:00AM PST -> $(TZ=America/Los_Angeles date -d 'today 11:00' +"%Y-%m-%d %H:%M:%S %Z")"
          echo ""
          echo "✅ UTC EQUIVALENTS:"
          echo "   9:00 AM PST = $(date -u -d "TZ=\"America/Los_Angeles\" 09:00" +"%H:%M UTC")"
          echo "   9:30 AM PST = $(date -u -d "TZ=\"America/Los_Angeles\" 09:30" +"%H:%M UTC")"
          echo "   10:00 AM PST = $(date -u -d "TZ=\"America/Los_Angeles\" 10:00" +"%H:%M UTC")"
          echo ""
          echo "✅ CRON ENTRIES CONFIGURED:"
          echo "   - cron: '0 16 * * *'   ->  9:00 AM PDT"
          echo "   - cron: '30 16 * * *'  ->  9:30 AM PDT / 8:30 AM PST"
          echo "   - cron: '0 17 * * *'   -> 10:00 AM PDT / 9:00 AM PST"
          echo "   - cron: '30 17 * * *'  ->  9:30 AM PST"
          echo "   - cron: '0 18 * * *'   -> 10:00 AM PST"
          echo ""
          echo "=================================="

      - name: Run send notifications script
        env:
          NODE_ENV: production
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          # Scheduling: run between 10:00am - 11:00am in America/Los_Angeles
          SONG_NOTIFICATIONS_TIMEZONE: 'America/Los_Angeles'
          SONG_NOTIFICATIONS_HOUR: '11'
          SONG_NOTIFICATIONS_MINUTE: '45'
          SEND_BATCH_SIZE: '50'
          FORCE_SEND: ${{ github.event.inputs.force || '0' }}
        run: npm run send:notifications